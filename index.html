<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indique um amigo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
font-family:Poppins;

background:
url("https://i.imgur.com/16UlxXk.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:40px 20px;
position:relative;
}

/* CONTROLE DE POSIÇÃO */

.header{
position:absolute;

/* AJUSTE AQUI */

top:50px;      /* subir ou descer */
left:475px;     /* mover para esquerda/direita */

display:flex;
flex-direction:column;
align-items:flex-start;
}

/* LOGO */

.logo{
width:160px;
margin-bottom:10px

}

/* HEADLINE */

.headline{
font-size:12px;
color:white;
text-align:left;
max-width:360px
}

/* APP BOX */

.app{
width:100%;
max-width:420px;
background:white;
border-radius:15px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
margin-top:200px;
}

/* FOOTER */

.footer{
margin-top:40px;
text-align:center;
font-size:12px;
opacity:0.9;
color:white
}

/* ÍCONE SVG */

.dev-icon{
vertical-align:middle;
margin-right:6px;
opacity:0.9
}

.footer a{
color:white;
text-decoration:none;
font-weight:600
}

.footer a:hover{
text-decoration:underline
}

/* MOBILE */

@media (max-width:480px){

body{
background-position: -100% 50%;;
}

.header{
top:50px;
left:20px;
}

.logo{
width:150px;
}

.app{
padding:25px;
margin-top:230px;
}

}

/* PROGRESSO */

.progress{
height:6px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
display:none
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c853,#64dd17);
transition:.4s
}

.percent{
font-size:12px;
color:#666;
margin-bottom:25px;
display:none
}

/* TEXTOS */

h2{
font-size:17px;
margin-bottom:10px;
color:#333
}

/* INPUTS */

input,select{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
margin:15px 0;
font-size:15px
}

/* BOTÕES */

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-size:16px;
cursor:pointer
}

.secondary{
background:#eee;
color:#333;
margin-top:10px
}

/* POPUPS */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center
}

.popup-box{
background:white;
width:90%;
max-width:380px;
border-radius:16px;
padding:25px;
position:relative
}

.fechar-popup{
position:absolute;
top:12px;
right:12px;
font-size:20px;
font-weight:bold;
cursor:pointer;
color:#333
}

/* LEADS */

.lead-item{
padding:12px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center
}

.edit-btn{
background:#f1f1f1;
color:#333;
padding:6px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer
}

/* NOTIFICAÇÃO */

.notificacao{
position:fixed;
top:20px;
left:20px;
right:20px;
background:#ff5252;
color:white;
padding:14px 16px;
border-radius:8px;
font-size:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
opacity:0;
transform:translateY(-20px);
pointer-events:none;
transition:all .35s ease;
z-index:9999;
display:flex;
align-items:center;
gap:10px
}

.notificacao.show{
opacity:1;
transform:translateY(0)
}

</style>
</head>

<body>

<div class="notificacao" id="notificacao"></div>

<!-- HEADER CONTROLÁVEL -->

<div class="header">

<img src="https://i.imgur.com/m0Rfd3K.png" class="logo">

<div class="headline">
<h1>Indique amigos que também podem se beneficiar dessa oportunidade.</h1>
</div>

</div>

<div class="app">

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<div class="percent" id="percent"></div>

<div id="conteudo"></div>

</div>

<footer class="footer">

<svg class="dev-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 24 24">
<path d="M8 5L3 12L8 19M16 5L21 12L16 19M14 3L10 21"/>
</svg>

Desenvolvido por:
<a href="https://instagram.com/gu.kasopi" target="_blank">
Gustavo Kasopi
</a>

</footer>

<script>

let etapa=0;

function tela(){

let html=`<h2>Olá, qual o seu nome?</h2>
<input placeholder="Ex: João da Silva">
<button>Avançar</button>`;

document.getElementById("conteudo").innerHTML=html;

}

tela();

</script>

</body>
</html>
